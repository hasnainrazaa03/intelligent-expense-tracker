<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the theme before first paint to avoid a flash. Dark by default
      // (Orbit is dark-first) unless the user has previously chosen light.
      try { if (localStorage.getItem('appTheme') !== 'light') document.documentElement.classList.add('dark'); }
      catch (e) { document.documentElement.classList.add('dark'); }
    </script>
    <link rel="icon" type="image/png" href="/trojan1.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08060f" />
    <link rel="canonical" href="https://example.com/" />
    <meta name="description" content="Orbit — a smart expense, budget, and tuition tracker for USC students, with AI insights and backup/restore." />
    <meta property="og:title" content="Orbit — Expense Tracker" />
    <meta property="og:description" content="Track expenses, income, budgets, and USC tuition installments with AI-powered insights." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/trojan1.png" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Orbit — Expense Tracker" />
    <meta property="twitter:description" content="Stay ahead of spending with dashboards, reports, and proactive budget alerts." />
    <meta property="twitter:image" content="/trojan1.png" />
    <script type="application/ld+json">
